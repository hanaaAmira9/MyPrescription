<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal d’audit - MyPrescription</title>
    <link rel="stylesheet" href="styles.css" />

</head>
<style>
    /* =========================
   styles.css — Audit Logs UI
   ========================= */

    /* ---------- Variables ---------- */
    :root {
        --primary-dark: #ffffff;
        --primary-blue: #1a2d4a;
        --accent-cyan: #00d4ff;
        --accent-cyan-light: #5ce1e6;
        --accent-cyan-dark: #00a8cc;

        --gradient-button: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
        --gradient-button-hover: linear-gradient(135deg, #5ce1e6 0%, #00d4ff 100%);

        --text-dark: #1a2d4a;
        --text-gray: rgba(26, 45, 74, .72);

        --bg: #f6f9fc;
        --border-light: rgba(26, 45, 74, .14);

        --shadow: 0 18px 40px rgba(0, 0, 0, .08);
        --radius: 22px;
        --transition-normal: .2s ease;
    }

    /* ---------- Base ---------- */
    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 650px at 15% -10%, rgba(0, 212, 255, .10), transparent 60%),
            radial-gradient(900px 500px at 110% 30%, rgba(92, 225, 230, .10), transparent 55%),
            var(--bg);
        color: var(--text-dark);
    }

    /* ---------- Header ---------- */
    .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(255, 255, 255, .86);
        border-bottom: 1px solid var(--border-light);
        backdrop-filter: blur(10px);
    }

    .header-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text-dark);
        font-weight: 900;
    }

    .logo-icon {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        border: 1px solid var(--border-light);
        background: #fff;
    }

    .logo-icon svg {
        width: 22px;
        height: 22px;
        color: var(--accent-cyan-dark);
    }

    .logo-text {
        letter-spacing: -0.2px;
    }

    /* Nav */
    .nav-menu {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .nav-link {
        text-decoration: none;
        color: rgba(26, 45, 74, .78);
        font-weight: 800;
        font-size: 0.95rem;
        padding: 10px 12px;
        border-radius: 14px;
        transition: all var(--transition-normal);
    }

    .nav-link:hover {
        background: rgba(0, 212, 255, .10);
        color: var(--text-dark);
    }

    .nav-link.active {
        color: var(--text-dark);
    }

    .nav-link.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent-cyan);
        border-radius: 2px;
    }

    /* Auth buttons */
    .auth-buttons {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .btn-login,
    .btn-signup {
        background: transparent;
        color: var(--text-gray);
        padding: 0.6rem 1.25rem;
        border: none;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: inherit;
    }

    .btn-login:hover,
    .btn-signup:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 212, 255, .45);
    }

    /* Mobile menu btn (optionnel visuel) */
    .mobile-menu-btn {
        width: 44px;
        height: 42px;
        border-radius: 14px;
        border: 1px solid var(--border-light);
        background: #fff;
        display: none;
        cursor: pointer;
        padding: 10px;
    }

    .mobile-menu-btn span {
        display: block;
        height: 2px;
        background: rgba(26, 45, 74, .55);
        margin: 5px 0;
        border-radius: 999px;
    }

    /* ---------- Container + Page head ---------- */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 26px 18px 40px;
    }

    .page-head {
        margin: 10px 0 16px;
    }

    .page-head h1 {
        margin: 0 0 6px;
        font-size: 2rem;
        letter-spacing: -0.5px;
    }

    .page-head p {
        margin: 0;
        color: var(--text-gray);
        font-weight: 700;
    }

    /* ---------- Cards ---------- */
    .card {
        background: #fff;
        border: 1px solid var(--border-light);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
        margin: 12px 0;
    }

    /* ---------- Filters ---------- */
    .filters {
        display: grid;
        grid-template-columns: 1.3fr 220px 220px 160px;
        gap: 12px;
        align-items: center;
    }

    .input,
    .select {
        width: 100%;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid var(--border-light);
        background: #fff;
        font-weight: 700;
        color: var(--text-dark);
    }

    .input::placeholder {
        color: rgba(26, 45, 74, .45);
        font-weight: 700;
    }

    .input:focus,
    .select:focus {
        outline: none;
        border-color: rgba(0, 212, 255, .55);
        box-shadow: 0 0 0 4px rgba(0, 212, 255, .14);
    }

    /* ---------- Buttons ---------- */
    .btn {
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 900;
        border: 1px solid var(--border-light);
        background: #fff;
        transition: all var(--transition-normal);
    }

    .btn:hover {
        transform: translateY(-1px);
    }

    .btn-primary {
        border: none;
        background: var(--gradient-button);
        color: var(--text-dark);
    }

    .btn-primary:hover {
        background: var(--gradient-button-hover);
    }

    .btn-outline {
        background: #fff;
    }

    /* ---------- Table ---------- */
    .table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 18px;
        overflow: hidden;
    }

    .table thead th {
        text-align: left;
        font-size: .8rem;
        text-transform: uppercase;
        letter-spacing: .3px;
        color: rgba(26, 45, 74, .62);
        padding: 12px 12px;
        background: #fbfdff;
        border-bottom: 1px solid var(--border-light);
        white-space: nowrap;
    }

    .table tbody td {
        padding: 12px 12px;
        border-bottom: 1px solid var(--border-light);
        font-weight: 700;
    }

    .table tbody tr:hover {
        background: rgba(0, 212, 255, .06);
    }

    .table tbody td:nth-child(1) {
        color: rgba(26, 45, 74, .75);
        white-space: nowrap;
    }

    /* ---------- Pagination ---------- */
    .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
        flex-wrap: wrap;
    }

    .pagination span {
        color: var(--text-gray);
        font-weight: 900;
    }

    /* ---------- Toasts ---------- */
    .toastArea {
        position: fixed;
        right: 16px;
        bottom: 16px;
        display: grid;
        gap: 10px;
        z-index: 99;
    }



    /* ---------- Responsive ---------- */
    @media (max-width: 980px) {
        .filters {
            grid-template-columns: 1fr;
        }

        .mobile-menu-btn {
            display: inline-block;
        }

        .nav-menu {
            display: none;
        }

    }

    @media (max-width: 640px) {
        .page-head h1 {
            font-size: 1.6rem;
        }

        .card {
            padding: 14px;
        }
    }
</style>

<body>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="3" />
                    </svg>
                </div>
                <span class="logo-text">MyPrescription</span>
            </a>

            <nav class="nav-menu">
                <a href="dashbord.html" class="nav-link">Dashboard</a>
                <a href="rendvous.html" class="nav-link">Rendez-vous</a>
                <a href="auditlogs.html" id="navAudit active" class="nav-link active">Audit Logs</a>
            </nav>

            <div class="auth-buttons">
                <button class="btn-login" id="btnLogout">Déconnexion</button>

            </div>

            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="container">

        <section class="page-head">
            <h1>Journal d’audit</h1>
            <p>Journal de sécurité et d’activité système</p>
        </section>

        <section class="card">
            <div class="filters">
                <input id="q" class="input" placeholder="Recherche (événement, utilisateur, route…)" />

                <select id="result" class="select">
                    <option value="">Tous les résultats</option>
                    <option value="SUCCESS">Succès</option>
                    <option value="FAIL">Échec</option>
                    <option value="DENY">Refus</option>
                </select>

                <select id="action" class="select">
                    <option value="">Toutes les actions</option>
                    <option value="LOGIN">Connexion</option>
                    <option value="LOGOUT">Déconnexion</option>
                    <option value="REFRESH">Rafraîchir</option>
                    <option value="CREATE">Création</option>
                    <option value="READ">Lecture</option>
                    <option value="UPDATE">Mise à jour</option>
                    <option value="DELETE">Suppression</option>
                </select>

                <button id="btnRefresh" class="btn btn-primary" type="button">Actualiser</button>
            </div>
        </section>

        <section class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Événement</th>
                        <th>Action</th>
                        <th>Résultat</th>
                        <th>Utilisateur</th>
                        <th>Route</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td colspan="6">Chargement…</td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">
                <button id="btnPrev" class="btn btn-outline" type="button">Précédent</button>
                <span>Page <span id="page">1</span></span>
                <button id="btnNext" class="btn btn-outline" type="button">Suivant</button>
            </div>
        </section>

    </main>

    <div id="toastArea" class="toastArea"></div>

    <script src="auditLogs.js"></script>
</body>

</html>
